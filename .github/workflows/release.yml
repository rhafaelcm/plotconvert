name: release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/^version *= *"([^"]+)".*/\1/')
          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9A-Za-z-]+)+$ ]]; then
            echo "Failed to parse version from Cargo.toml: '$VERSION'" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release v${VERSION} not found, will build"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: plotconvert-linux-x86_64
            binary: target/x86_64-unknown-linux-gnu/release/plotconvert
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: plotconvert-windows-x86_64.exe
            binary: target/x86_64-pc-windows-msvc/release/plotconvert.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}
        continue-on-error: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  publish-release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp artifacts/plotconvert-linux-x86_64/plotconvert release-assets/plotconvert-linux-x86_64
          cp artifacts/plotconvert-windows-x86_64.exe/plotconvert.exe release-assets/plotconvert-windows-x86_64.exe
          chmod +x release-assets/plotconvert-linux-x86_64

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: plotconvert v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
